<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavUNI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="lib/leaflet/leaflet.css">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAU7vW-ZXuIQVLtebIGISxjP4uHdunGYLg&callback=initMap" async defer></script>
    <script src="lib/leaflet/leaflet.js" defer></script>
    <script src="index.js" defer></script>
    


</head>
<body>
    <div id="sidebar">
        <h2>Uni Nav</h2>
        <p>Find the shortest path across campus.</p>
        
        <div class="input-group">
            <label for="origin-search">Origen:</label>
            <input type="text" id="origin-search" placeholder="Desde..." autocomplete="off">
            <div id="origin-suggestions" class="suggestions-box"></div>
            <input type="hidden" id="origin-latlng">
        </div>

        <div class="input-group">
            <label for="destination-search">Destino:</label>
            <input type="text" id="destination-search" placeholder="Hacia..." autocomplete="off">
            <div id="destination-suggestions" class="suggestions-box"></div>
            <input type="hidden" id="dest-latlng">
        </div>

        <button id="route-btn" onclick="startRoute()">Route</button>
    </div>

    <div id="map"></div>
</body>
</html>
